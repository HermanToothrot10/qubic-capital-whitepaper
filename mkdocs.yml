site_name: Qubic Capital - Whitepaper
site_description: Whitepaper

theme:
  name: material
  language: en
  logo: assets/logo2.png
  favicon: assets/logo2.png
  palette:
    - scheme: slate
      primary: black
      accent: teal
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.highlight
    - content.code.copy

extra_css:
  - styles/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite

extra:
  generator: false
  
nav:
  - Home: index.md
  - Introduction: 01-introduction.md
  - Smart Contracts in Qubic: 02-smart-contracts-in-qubic.md
  - Ownership Concentration: 03-ownership-concentration.md
  - The Qubic Capital Solution: 04-the-qubic-capital-solution.md
  - Strategic Vision: 05-strategic-vision.md
  - Governance: 06-governance.md
  - Tokenomics: 07-tokenomics.md
  - How to Buy $QCAP: 08-how-to-buy-qcap.md
  - Long-Term Alignment: 09-long-term-alignment.md
